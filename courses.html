<!DOCTYPE html>
<html>

<head>
    <title>Courses</title>
    <meta charset="UTF-8">

    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, black, #003366);
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            padding: 25px;
            width: 550px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            margin-top: 0;
        }

        table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
            background: white;
            color: black;
            border-radius: 10px;
            overflow: hidden;
        }

        th,
        td {
            padding: 12px;
            border: 1px solid #ccc;
            text-align: center;
        }

        th {
            background: #003366;
            color: white;
        }

        tr:hover {
            background: #ececec;
        }
    </style>

</head>

<body>

    <div class="container">
        <h1>Bright Learn – Courses</h1>

        <table>
            <tr>
                <th>Course Name</th>
                <th>Duration</th>
                <th>Fee</th>
            </tr>
            <tr>
                <td>Web Development</td>
                <td>3 Months</td>
                <td>₹4999</td>
            </tr>
            <tr>
                <td>Data Science</td>
                <td>4 Months</td>
                <td>₹5999</td>
            </tr>
            <tr>
                <td>Graphic Design</td>
                <td>2 Months</td>
                <td>₹2999</td>
            </tr>
            <tr>
                <td>Digital Marketing</td>
                <td>3 Months</td>
                <td>₹3999</td>
            </tr>
        </table>
        <div style="width:100%; display:flex; justify-content:center; margin-top:25px;">
            <button onclick="window.location.href='index.html'" style="
            padding:12px 25px;
            background:#00ccff;
            color:white;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
            font-weight:bold;
        ">
                ⬅ Back to Home
            </button>
        </div>

    </div>



</body>

</html>
