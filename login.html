<!DOCTYPE html>
<html>

<head>
    <title>Bright Learn - Login</title>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="login_style.css">
    

   

</head>

<body>

    <div class="container">
        <h1>BRIGHT LEARN</h1>
        <h3>Login to Continue</h3>

        <form onsubmit="return validateLogin()">
            <p>Username:</p>
            <input type="text" id="user" placeholder="Enter Username">

            <p>Password:</p>
            <input type="password" id="pass" placeholder="Enter Password">

            <input type="submit" value="Login">

            <button type="button" onclick="window.location.href='signup.html'" 
style="
    width:100%;
    background:#00cc66;
    padding:10px;
    border:none;
    margin-top:10px;
    color:white;
    cursor:pointer;
    border-radius:8px;
    display:block;    /* <--- This forces the button to go below */
">
    Sign Up
</button>

        </form>
    </div>

</body>
</html>
