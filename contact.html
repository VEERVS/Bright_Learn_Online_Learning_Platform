<!DOCTYPE html>
<html>

<head>
    <title>Contact Us</title>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="contact_style.css">
</head>

<body>

    <div class="container">
        <h1>Contact Us</h1>
        <p style="text-align:center;">Have questions? We're here to help!</p>

        <table>
            <tr><th>Email</th><td>support@brightlearn.com</td></tr>
            <tr><th>Phone</th><td>+91 98765 43210</td></tr>
            <tr><th>Address</th><td>KIET Group of Institutions</td></tr>
        </table>

        <h2>Send Feedback</h2>

        <form>
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label>Your Email</label>
                <input type="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Your Message</label>
                <textarea rows="4" placeholder="Write your feedback..." required></textarea>
            </div>

            <button type="submit">Submit</button>
        </form>
        <div style="width:100%; display:flex; justify-content:center; margin-top:25px;">
    <button onclick="window.location.href='index.html'"
        style="
            padding:12px 25px;
            background:#00ccff;
            color:white;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
            font-weight:bold;
        ">
        ⬅ Back to Home
    </button>
</div>

    </div>

</body>
</html>
