<!DOCTYPE html>
<html>

<head>
    <title>Contact Us</title>
    <meta charset="UTF-8">

    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #000000, #003366);
            font-family: Arial, sans-serif;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            padding: 30px;
            width: 450px;
            border-radius: 15px;
            backdrop-filter: blur(6px);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        h1, h2 {
            text-align: center;
            margin-top: 0;
        }

        table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
            background: white;
            color: black;
            border-radius: 10px;
            overflow: hidden;
        }

        table th, table td {
            padding: 10px;
            border: 1px solid #ccc;
            text-align: left;
        }

        .form-group {
            margin-top: 15px;
        }

        label {
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background: #0066cc;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0055aa;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Contact Us</h1>
        <p style="text-align:center;">Have questions? We're here to help!</p>

        <table>
            <tr><th>Email</th><td>support@brightlearn.com</td></tr>
            <tr><th>Phone</th><td>+91 98765 43210</td></tr>
            <tr><th>Address</th><td>KIET Group of Institutions</td></tr>
        </table>

        <h2>Send Feedback</h2>

        <form>
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label>Your Email</label>
                <input type="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Your Message</label>
                <textarea rows="4" placeholder="Write your feedback..." required></textarea>
            </div>

            <button type="submit">Submit</button>
        </form>
        <div style="width:100%; display:flex; justify-content:center; margin-top:25px;">
    <button onclick="window.location.href='index.html'"
        style="
            padding:12px 25px;
            background:#00ccff;
            color:white;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
            font-weight:bold;
        ">
        ⬅ Back to Home
    </button>
</div>

    </div>

</body>
</html>
