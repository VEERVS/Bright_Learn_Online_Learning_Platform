<!DOCTYPE html>
<html>

<head>
    <title>Bright Learn - Sign Up</title>
    <meta charset="UTF-8">

    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #000000, #003366);
            font-family: Arial, sans-serif;
            color: white;
        }

        .container {
            width: 350px;
            background: rgba(255, 255, 255, 0.15);
            padding: 25px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            width: 95%;
            padding: 10px;
            background: #00cc66;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>

    <script>
        function registerUser() {
            var user = document.getElementById("user").value;
            var pass = document.getElementById("pass").value;

            if (user === "" || pass === "") {
                alert("All fields are required!");
                return false;
            }

            // Save account in localStorage
            var users = JSON.parse(localStorage.getItem("users")) || {};

            if (users[user]) {
                alert("Username already exists!");
                return false;
            }

            users[user] = pass;
            localStorage.setItem("users", JSON.stringify(users));

            alert("Account Created Successfully!");
            window.location.href = "login.html";
            return false;
        }
    </script>

</head>

<body>

    <div class="container">
        <h1>Create Account</h1>

        <input type="text" id="user" placeholder="Create Username">
        <input type="password" id="pass" placeholder="Create Password">

        <button onclick="registerUser()">Sign Up</button>
    </div>

</body>
</html>
